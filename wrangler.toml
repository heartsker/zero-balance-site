# Cloudflare Worker configuration (this site is a Worker with static assets,
# NOT a Cloudflare Pages project).
#
# `wrangler deploy` uploads the prebuilt Astro output in ./dist as static assets
# and deploys the Worker in worker/index.ts. Static assets are served first;
# any request that does not match an asset (notably the bare root `/`) is handled
# by the Worker, which redirects `/` to the visitor's locale.
name = "zero-balance-site"
main = "worker/index.ts"
compatibility_date = "2026-05-21"

[assets]
directory = "./dist"
binding = "ASSETS"
# Serve dist/404.html for unknown paths instead of an empty 404.
not_found_handling = "404-page"

# Keep Workers Logs on (matches the project's prior remote setting).
[observability]
enabled = true
